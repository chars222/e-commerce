<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    
    <!-- Íconos de la pestaña (Favicon) - Cambiado a SVG -->
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="apple-touch-icon" href="/logo.svg" />
    
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- ========================================== -->
    <!-- 🔍 SEO: Búsquedas en Google                -->
    <!-- ========================================== -->
    <!-- El título debe tener el nombre de tu marca y qué vendes -->
    <title>CENTRAL | Moda y Lujo Silencioso</title>
    
    <!-- La descripción que aparece debajo del link en Google -->
    <meta name="description" content="Explora nuestra nueva colección de ropa minimalista y esencial. Moda premium, calidad garantizada. Compra en línea con CENTRAL." />
    <meta name="keywords" content="moda, ropa, lujo silencioso, poleras, pantalones, ecommerce, tienda online" />
    <meta name="author" content="CENTRAL" />

    <!-- ========================================== -->
    <!-- 📱 OPEN GRAPH: Compartir en WhatsApp/Redes -->
    <!-- ========================================== -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="CENTRAL | Catálogo de Moda" />
    <meta property="og:description" content="Explora nuestra colección exclusiva y realiza tu pedido fácilmente." />
    <!-- Para og:image, lo ideal sigue siendo un PNG o JPG, pero puedes probar con SVG si el servicio lo soporta -->
    <meta property="og:image" content="/logo.svg" /> 
    
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
